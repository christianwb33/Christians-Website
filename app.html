<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Player Guesser</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: #2c3e50; 
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 3px solid #f39c12; 
        }
        h1 { color: #f39c12; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
        #clue-list { list-style-type: none; padding: 0; margin: 25px 0; text-align: left; min-height: 150px; }
        #clue-list li {
            background: rgba(255,255,255,0.1);
            padding: 12px; margin-bottom: 8px; border-radius: 6px;
            border-left: 4px solid #3498db;
        }
        input[type="text"] {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border-radius: 6px; border: none; box-sizing: border-box; font-size: 16px;
        }
        button {
            width: 100%; padding: 12px; border-radius: 6px; border: none;
            font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            margin-bottom: 10px; transition: background 0.2s;
        }
        #submit-btn { background-color: #27ae60; color: white; }
        #submit-btn:hover { background-color: #219150; }
        #clue-btn { background-color: #3498db; color: white; }
        #clue-btn:hover { background-color: #2980b9; }
        #play-again-btn { background-color: #f39c12; color: white; margin-top: 20px;}
        #play-again-btn:hover { background-color: #d35400; }
        #feedback { margin-top: 20px; font-weight: bold; font-size: 18px; min-height: 24px; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }
        .hidden { display: none !important; }
        .back-link {
            display: block; text-align: center; margin-top: 25px;
            text-decoration: none; color: #bdc3c7; font-size: 14px;
        }
        .back-link:hover { color: #f39c12; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>NBA Player Guesser</h1>
        <p>Guess the NBA player based on the clues!</p>
        <p>Guesses Left: <strong id="guesses-left">3</strong></p>

        <ul id="clue-list"></ul>

        <div id="input-area">
            <input type="text" id="guess-input" placeholder="Enter Player Name (e.g., LeBron James)">
            <button id="submit-btn">Submit Guess</button>
            <button id="clue-btn">Get Next Clue</button>
        </div>

        <p id="feedback"></p>
        <button id="play-again-btn" class="hidden">Play Again</button>

        <a href="scratch.html" class="back-link">&larr; Return to Scratch Page</a>
    </div>

    <script>
        // Wrapping everything in DOMContentLoaded ensures the HTML exists before the script runs
        document.addEventListener("DOMContentLoaded", function() {
            
            const playerData = [
                { name: "LeBron James", clues: ["Position: Forward", "Teams: Cavaliers, Heat, Lakers", "Drafted: 2003, 1st Overall", "Known as 'The King'"] },
                { name: "Stephen Curry", clues: ["Position: Guard", "Team: Golden State Warriors", "College: Davidson", "Holds record for most 3-pointers made"] },
                { name: "Kevin Durant", clues: ["Position: Forward", "Teams: Sonics/Thunder, Warriors, Nets, Suns", "Nicknamed 'The Slim Reaper'", "Won 2 NBA Championships"] },
                { name: "Giannis Antetokounmpo", clues: ["Position: Forward", "Team: Milwaukee Bucks", "Country: Greece", "Known as 'The Greek Freak'"] },
                { name: "Nikola Jokic", clues: ["Position: Center", "Team: Denver Nuggets", "Country: Serbia", "First Center to win MVP since Shaq"] },
                { name: "Luka Doncic", clues: ["Position: Guard", "Team: Dallas Mavericks", "Country: Slovenia", "Won Rookie of the Year in 2019"] },
                { name: "Jayson Tatum", clues: ["Position: Forward", "Team: Boston Celtics", "College: Duke", "Drafted 3rd overall in 2017"] }
            ];

            let currentPlayer;
            let currentClueIndex;
            let guessesLeft;
            let gameOver;

            const clueList = document.getElementById('clue-list');
            const guessInput = document.getElementById('guess-input');
            const submitBtn = document.getElementById('submit-btn');
            const clueBtn = document.getElementById('clue-btn');
            const feedback = document.getElementById('feedback');
            const guessesLeftDisplay = document.getElementById('guesses-left');
            const playAgainBtn = document.getElementById('play-again-btn');
            const inputArea = document.getElementById('input-area');

            function startGame() {
                gameOver = false; 
                currentClueIndex = 0; 
                guessesLeft = 3;
                feedback.textContent = ""; 
                feedback.className = "";
                clueList.innerHTML = ""; 
                guessInput.value = "";
                
                inputArea.classList.remove('hidden');
                playAgainBtn.classList.add('hidden');
                
                // Select a random player
                currentPlayer = playerData[Math.floor(Math.random() * playerData.length)];
                updateDisplay(); 
                addClue(); 
            }

            function addClue() {
                if (currentClueIndex < currentPlayer.clues.length) {
                    const li = document.createElement('li');
                    li.textContent = `Clue ${currentClueIndex + 1}: ${currentPlayer.clues[currentClueIndex]}`;
                    clueList.appendChild(li);
                    currentClueIndex++;
                } else {
                    feedback.textContent = "No more clues available!";
                    feedback.className = "wrong";
                }
            }

            function updateDisplay() { 
                guessesLeftDisplay.textContent = guessesLeft; 
            }

            function handleGuess() {
                if (gameOver) return;
                const userGuess = guessInput.value.trim();
                if (userGuess === "") return;

                // Check if guess matches (ignoring capital letters)
                if (userGuess.toLowerCase() === currentPlayer.name.toLowerCase()) {
                    endGame(true);
                } else {
                    guessesLeft--; 
                    updateDisplay(); 
                    guessInput.value = ""; 
                    
                    if (guessesLeft > 0) {
                        feedback.textContent = `Wrong! "${userGuess}" is not correct. Try again.`;
                        feedback.className = "wrong";
                    } else {
                        endGame(false);
                    }
                }
            }

            function endGame(win) {
                gameOver = true;
                inputArea.classList.add('hidden'); 
                playAgainBtn.classList.remove('hidden'); 

                if (win) {
                    feedback.textContent = `CORRECT! It was ${currentPlayer.name}! 🏀`;
                    feedback.className = "correct";
                } else {
                    feedback.textContent = `GAME OVER! The player was ${currentPlayer.name}.`;
                    feedback.className = "wrong";
                    // Reveal all clues if they lose
                    clueList.innerHTML = ""; 
                    currentPlayer.clues.forEach((clue, index) => {
                         const li = document.createElement('li');
                         li.textContent = `Clue ${index + 1}: ${clue}`;
                         clueList.appendChild(li);
                    });
                }
            }

            // Event Listeners
            submitBtn.addEventListener('click', handleGuess);
            clueBtn.addEventListener('click', addClue);
            playAgainBtn.addEventListener('click', startGame);
            
            // Allow 'Enter' key to submit
            guessInput.addEventListener('keypress', function(e) { 
                if (e.key === 'Enter') handleGuess(); 
            });

            // Start the game for the first time
            startGame();
        });
    </script>
</body>
</html>
